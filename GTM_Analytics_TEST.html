<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Horizon Content Subscribe → dataLayer test</title>

  <!-- Google Tag Manager -->
  <script>
    (function (w, d, s, l, i) {
      w[l] = w[l] || [];
      w[l].push({ "gtm.start": new Date().getTime(), event: "gtm.js" });
      var f = d.getElementsByTagName(s)[0],
        j = d.createElement(s),
        dl = l != "dataLayer" ? "&l=" + l : "";
      j.async = true;
      j.src = "https://www.googletagmanager.com/gtm.js?id=" + i + dl;
      f.parentNode.insertBefore(j, f);
    })(window, document, "script", "dataLayer", "GTM-K9P6972K");
  </script>
  <!-- End Google Tag Manager -->

  <style>
    body { font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 0; }
    header { padding: 16px; border-bottom: 1px solid #ddd; }
    .wrap { padding: 16px; display: grid; gap: 12px; }
    ip-embed-leaflet { display: block; width: 100%; min-height: 75vh; }
    .log { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
           white-space: pre-wrap; background: #f6f6f6; padding: 12px; border-radius: 8px; }
  </style>

  <script>
    function whenHorizonReady(horizonEl) {
      if (!horizonEl) return Promise.reject(new Error("No horizon element found"));
      if (horizonEl.getAttribute("ready") === "true") return Promise.resolve(true);
      return new Promise((resolve) => {
        horizonEl.addEventListener("ready", () => resolve(true), { once: true });
      });
    }

    function dlPush(obj) {
      window.dataLayer = window.dataLayer || [];
      window.dataLayer.push(obj);

      // visible debug output
      const el = document.getElementById("debug-log");
      if (el) el.textContent += JSON.stringify(obj) + "\n";
      console.log("dataLayer.push:", obj);
    }

    // Prevent double init (important if anything re-runs scripts)
    function ensureSingleInit(key) {
      window.__horizonInit = window.__horizonInit || {};
      if (window.__horizonInit[key]) return false;
      window.__horizonInit[key] = true;
      return true;
    }

    function normalizeOfferFields(content) {
      if (!content || content.$type !== "offer") return null;

      const firstProduct = Array.isArray(content.products) && content.products.length ? content.products[0] : null;

      return {
        header: content.header || null,
        summary: content.summary || null,
        sales_price: content.sales_price && typeof content.sales_price.value === "number" ? content.sales_price.value : null,
        product_count: Array.isArray(content.products) ? content.products.length : 0,
        // optional: include first product fields only to keep payload small
        product: firstProduct ? {
          sku: firstProduct.sku || null,
          title: firstProduct.title || null,
          brand: firstProduct.brand || null,
          price: firstProduct.price && typeof firstProduct.price.value === "number" ? firstProduct.price.value : null,
          sale_price: firstProduct.sale_price && typeof firstProduct.sale_price.value === "number" ? firstProduct.sale_price.value : null,
          url: firstProduct.url || null
        } : null
      };
    }

    async function initHorizonToDataLayer() {
      if (!ensureSingleInit("content-subscribe")) return;

      const horizonEl = document.getElementById("horizon");
      await whenHorizonReady(horizonEl);

      dlPush({
        event: "horizon_ready",
        horizon: { alias: horizonEl.getAttribute("alias") || null, elementId: horizonEl.id || null }
      });

      const api = await horizonEl.getApi();

      // Subscribe to content events (from your docs)
      const subscription = api.content.subscribe((contentEvent) => {
        const c = contentEvent && contentEvent.value ? contentEvent.value : null;

        // Keep event payload small + stable:
        const base = {
          event: "horizon_content_event",
          horizon: { alias: horizonEl.getAttribute("alias") || null },
          action: contentEvent ? contentEvent.action : null,   // viewEnter | viewLeave | click
          source: contentEvent ? contentEvent.source : null,   // content | price | splash | cta
          contentType: c ? c.$type : null,
          contentGuid: c ? c.contentGuid : null
        };

        // If offer, add a small offer summary
        const offer = normalizeOfferFields(c);
        if (offer) base.offer = offer;

        dlPush(base);

        // Optional convenience events (so GTM triggers are easier):
        if (base.action === "click") {
          dlPush({ event: "horizon_click", ...base });
        } else if (base.action === "viewEnter") {
          dlPush({ event: "horizon_view_enter", ...base });
        } else if (base.action === "viewLeave") {
          dlPush({ event: "horizon_view_leave", ...base });
        }
      });

      dlPush({ event: "horizon_subscription_active", hasUnsubscribe: !!(subscription && subscription.unsubscribe) });

      // Optional: expose unsubscribe for debugging
      window.__horizonUnsubscribe = () => subscription && subscription.unsubscribe && subscription.unsubscribe();
    }

    document.addEventListener("DOMContentLoaded", () => {
      dlPush({ event: "horizon_testpage_loaded" });
      initHorizonToDataLayer().catch((err) => {
        dlPush({ event: "horizon_init_error", message: String(err && err.message ? err.message : err) });
        console.error(err);
      });
    });
  </script>
</head>

<body>
  <!-- Google Tag Manager (noscript) -->
  <noscript>
    <iframe src="https://www.googletagmanager.com/ns.html?id=GTM-K9P6972K"
      height="0" width="0" style="display:none;visibility:hidden"></iframe>
  </noscript>
  <!-- End Google Tag Manager (noscript) -->

  <header>
    <strong>Horizon Content Subscribe → dataLayer test</strong><br />
    Alias: <code>kleemarkt/kleemarktstore</code>
  </header>

  <div class="wrap">
    <ip-embed-leaflet id="horizon" alias="kleemarkt/kleemarktstore"></ip-embed-leaflet>

    <div>
      <div style="margin: 6px 0;"><strong>Debug dataLayer pushes:</strong></div>
      <div id="debug-log" class="log"></div>
    </div>
  </div>

  <!-- Load the embed web component ONCE -->
  <script defer src="https://embed.ipaper.io/web.js" type="module"></script>
</body>
</html>
