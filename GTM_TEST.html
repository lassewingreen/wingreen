<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111827" />
    <title>Lasse Wingreen | Product Owner & Wedding Singer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.3/css/all.min.css" />
</head>

<body class="font-sans antialiased bg-gray-100">

    <nav class="top-0 left-0 z-50 w-full absolute flex items-center justify-between px-4 py-4">
        <a href="#home" class="text-white text-lg font-bold uppercase tracking-wide">
            Lasse Wingreen
        </a>
        <button class="lg:hidden text-white p-2 rounded-md hover:bg-white/10 transition-colors"
            onclick="document.getElementById('mobile-menu').classList.toggle('hidden')">
            <i class="fas fa-bars text-xl"></i>
        </button>
        <div id="mobile-menu" class="hidden lg:flex absolute lg:relative top-full left-0 w-full lg:w-auto bg-gray-800 lg:bg-transparent px-4 pb-4 lg:p-0 space-y-2 lg:space-y-0 lg:space-x-6">
            <a href="#about" class="block text-white hover:text-gray-300 py-2 transition">About</a>
            <a href="#contact" class="block text-white hover:text-gray-300 py-2 transition">Contact</a>
        </div>
    </nav>

    <!-- Changed height handling to prevent footer overlap -->
    <section id="screen" class="relative min-h-[75vh]">
        <section id="home" class="relative min-h-[50vh] md:min-h-[60vh] flex items-center justify-center">
            <div class="absolute inset-0">
                <iframe
                    src="https://fast.wistia.net/embed/iframe/to40tf54hb?seo=false&videoFoam=true&autoplay=true&mute=true&loop=true"
                    class="h-full w-full object-cover object-center filter grayscale"
                    title="Flow &amp; Green - No Diggity Video" allow="autoplay; fullscreen; picture-in-picture"
                    frameborder="0" scrolling="no">
                </iframe>
                <div class="absolute inset-0 bg-black bg-opacity-30"></div>
                <div class="pointer-events-none absolute bottom-0 w-full h-16 bg-gradient-to-b from-transparent to-gray-500"></div>
            </div>

            <!-- Enhanced spacing hierarchy -->
            <div class="relative z-10 text-center text-white px-4 space-y-6">
                <img src="./assets/img/team-2-800x800.jpg" alt="Lasse Wingreen"
                    class="mx-auto rounded-full w-24 h-24 sm:w-32 sm:h-32 border-4 border-white shadow-lg filter grayscale" />
                <div class="space-y-4">
                    <h1 class="text-2xl sm:text-4xl md:text-5xl font-extrabold px-4 sm:px-0">
                        Hi, I'm Lasse!
                    </h1>
                    <p class="text-base sm:text-lg md:text-xl text-gray-200 max-w-xl mx-auto leading-relaxed">
                        Product Owner by day,
                        <a href="https://flowandgreen.dk" class="underline hover:text-gray-300 transition-colors" target="_blank">
                            Singer by night
                        </a>.
                    </p>
                </div>
            </div>
        </section>

        <section id="about" class="bg-gray-100 pt-12 pb-16 md:pt-16 md:pb-20">
            <div class="container mx-auto px-4 lg:px-8">
                <div class="bg-white rounded-xl shadow-xl p-8 md:p-12 lg:p-16">
                    <!-- Content unchanged -->
                </div>
            </div>
        </section>
    </section>

    <footer id="contact" class="bg-gray-800 py-12 text-white text-center">
        <!-- Footer content unchanged -->
    </footer>

</body>
</html>
